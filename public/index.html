    <optgroup label="공통 과목">

      <option value="calculus1">미적분Ⅰ</option>
      <option value="stats">확률과 통계</option>

    <optgroup label="진로/융합 선택">
      <option value="calculus2">미적분Ⅱ</option>

      <option value="ai-math">인공지능 수학</option>

  </select>
</div>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="showSection('dashboard')">대시보드</button>
        <button class="tab-btn" onclick="showSection('quiz')">문항 매칭 연습</button>
        <button class="tab-btn" onclick="showSection('checklist')">나의 체크리스트</button>
    </div>

    <div id="dashboard" class="section active">
        <h2>성취기준 목록</h2>

    </div>

            <div id="quiz-standard-list"></div>
        </div>
        <div id="quiz-level-matching" style="display: none;">
            <button class="save-btn" onclick="backToStandardSelection()" style="margin-bottom: 1rem; background:none; border:none; color:var(--primary); cursor:pointer; font-size:1rem; width: auto; padding: 0;">&larr; 성취기준 다시 선택</button>

                <button class="save-btn" onclick="nextLevelQuestion()" style="margin-top:1.5rem;">다음 문항 보기</button>
            </div>
        </div>
    </div>

    <div id="checklist" class="section">
        <h2>수업 진행 체크리스트</h2>
        <div id="checklist-container"></div>
        <button class="save-btn" onclick="saveChecklist()">진행 상황 저장하기</button>
    </div>
</div>

<div class="modal" id="level-modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>

    </div>
</div>

                { code: "[10공수2-01-04]", desc: "원의 방정식을 구하고, 그래프를 그릴 수 있다.", levels: { high: "원의 정의를 이용하여 원의 방정식을 유도할 수 있으며, 원의 방정식을 구하고 그래프를 그릴 수 있다.", mid: "원의 방정식을 구하고 그래프를 그릴 수 있다.", low: "안내된 절차에 따라 원의 방정식을 구할 수 있다." }, questions: [] },
                { code: "[10공수2-01-06]", desc: "평행이동을 탐구하고, 실생활과 연결하여 문제를 해결할 수 있다.", levels: { high: "도형의 평행이동을 탐구하고 평행이동한 도형의 방정식을 구할 수 있으며, 이를 실생활과 연결하여 문제를 해결할 수 있다.", mid: "도형의 평행이동을 이해하고 평행이동한 도형의 방정식을 구할 수 있으며, 실생활과 연결할 수 있다.", low: "평행이동한 점의 좌표를 구할 수 있다." }, questions: [] },
                { code: "[10공수2-01-07]", desc: "원점, x축, y축, 직선 y=x에 대한 대칭이동을 탐구하고, 실생활과 연결하여 문제를 해결할 수 있다.", levels: { high: "원점, x축, y축, 직선 y=x에 대한 대칭이동을 탐구하고 대칭이동한 도형의 방정식을 구할 수 있으며, 이를 실생활과 연결하여 문제를 해결할 수 있다.", mid: "원점, x축, y축, 직선 y=x에 대한 대칭이동을 이해하고 대칭이동한 도형의 방정식을 구할 수 있으며, 실생활과 연결할 수 있다.", low: "안내된 절차에 따라 대칭이동한 점의 좌표를 구할 수 있다." }, questions: [] },
                { code: "[10공수2-02-01]", desc: "집합의 개념을 이해하고, 집합을 표현할 수 있다.", levels: { high: "집합의 개념을 설명하고, 집합을 다양한 방법으로 표현할 수 있다.", mid: "집합의 개념을 알고, 집합을 표현할 수 있다.", low: "집합인 것과 집합이 아닌 것으로 구분하고, 집합을 표현할 수 있다." }, questions: [] },
                { code: "[10공수2-02-02]", desc: "두 집합 사이의 포함관계를 판단할 수 있다.", levels: { high: "두 집합 사이의 포함관계를 판단하여 기호로 표현하고, 그 이유를 설명할 수 있다.", mid: "두 집합 사이의 포함관계를 판단하여 기호로 표현할 수 있다.", low: "안내된 절차에 따라 간단한 두 집합 사이의 포함관계를 판단할 수 있다." }, questions: [] },
                { code: "[10공수2-02-03]", desc: "집합의 연산을 수행하고, 벤 다이어그램을 사용하여 나타낼 수 있다.", levels: { high: "집합의 연산을 체계적으로 수행하고 벤 다이어그램으로 나타낼 수 있으며, 집합의 연산에 관한 법칙을 벤 다이어그램으로 확인할 수 있다.", mid: "집합의 연산을 수행하고 벤 다이어그램으로 나타낼 수 있으며, 집합의 연산에 관한 법칙을 안다.", low: "집합의 연산을 수행하고, 벤 다이어그램으로 나타낼 수 있다." }, questions: [] },
                { code: "[10공수2-02-04]", desc: "명제와 조건의 뜻을 알고, '모든', '어떤'을 포함한 명제를 이해하고 설명할 수 있다.", levels: { high: "명제와 조건의 뜻을 알고 이를 설명할 수 있으며, '모든', '어떤'을 포함한 명제의 참, 거짓을 판별하고 그 이유를 설명할 수 있다.", mid: "명제와 조건의 뜻을 알고 이를 설명할 수 있으며, '모든', '어떤'을 포함한 명제의 참, 거짓을 판별할 수 있다.", low: "간단한 명제의 참, 거짓을 판별할 수 있다." }, questions: [] },
                { code: "[10공수2-02-06]", desc: "충분조건과 필요조건을 이해하고 판단할 수 있다.", levels: { high: "충분조건과 필요조건을 진리집합의 포함관계와 연결하여 이해하고 판단할 수 있다.", mid: "충분조건과 필요조건을 알고 판단할 수 있다.", low: "간단한 예를 통해 충분조건과 필요조건을 구분할 수 있다." }, questions: [] },
                { code: "[10공수2-02-08]", desc: "절대부등식의 뜻을 알고, 간단한 절대부등식을 증명할 수 있다.", levels: { high: "절대부등식의 뜻을 설명하고, 간단한 절대부등식을 증명할 수 있다.", mid: "절대부등식의 뜻을 알고, 안내된 절차에 따라 간단한 절대부등식을 증명할 수 있다.", low: "절대부등식의 뜻을 안다." }, questions: [] },
                { code: "[10공수2-03-01]", desc: "함수의 개념을 설명하고, 그 그래프를 이해한다.", levels: { high: "함수의 개념을 설명하고, 그 그래프를 이해하며 두 집합 사이의 대응 관계에서 함수인 것을 찾고 그 이유를 찾을 수 있다.", mid: "함수의 개념과 그래프를 이해하며, 두 집합 사이의 대응 관계에서 함수인 것을 찾을 수 있다.", low: "안내된 절차에 따라 간단한 두 집합 사이의 대응 관계에서 함수인 것을 찾을 수 있다." }, questions: [] },
                { code: "[10공수2-03-02]", desc: "함수의 합성을 설명하고, 합성함수를 구할 수 있다.", levels: { high: "함수의 합성을 설명하고, 두 함수의 합성이 가능한지 판단하며 합성함수를 구할 수 있다.", mid: "함수의 합성을 이해하고, 두 함수의 합성이 가능한지 판단하며 합성함수를 구할 수 있다.", low: "안내된 절차에 따라 간단한 합성함수를 구할 수 있다." }, questions: [] },
                { code: "[10공수2-03-03]", desc: "역함수의 개념을 설명하고, 역함수를 구할 수 있다.", levels: { high: "역함수의 개념과 존재 조건을 설명하고, 역함수를 구할 수 있다.", mid: "역함수의 개념을 이해하고, 역함수를 구할 수 있다.", low: "안내된 절차에 따라 간단한 함수의 역함수를 구할 수 있다." }, questions: [] },
                { code: "[10공수2-03-04]", desc: "유리함수 $y = \\frac{ax+b}{cx+d}$의 그래프를 그릴 수 있고, 그 그래프의 성질을 탐구하여 설명할 수 있다.", levels: { high: "유리함수의 그래프를 그릴 수 있고, 그 그래프의 성질을 탐구하여 설명할 수 있다.", mid: "유리함수의 그래프를 그릴 수 있고, 그 그래프의 성질을 이해한다.", low: "안내된 절차에 따라 유리함수의 그래프를 그릴 수 있다." }, questions: [] },
                { code: "[10공수2-03-05]", desc: "무리함수 $y = \\sqrt{ax+b}+c$의 그래프를 그릴 수 있고, 그 그래프의 성질을 탐구하여 설명할 수 있다.", levels: { high: "무리함수의 그래프를 그릴 수 있고, 그 그래프의 성질을 탐구하여 설명할 수 있다.", mid: "무리함수의 그래프를 그릴 수 있고, 그 그래프의 성질을 이해한다.", low: "안내된 절차에 따라 무리함수의 그래프를 그릴 수 있다." }, questions: [] }
            ]
        },
        algebra: {
            title: "대수",
            subtitle: "지수함수와 로그함수, 수열 단원 분석",
            standards: [
                { 
                    code: "[12대수01-01]", 
                    desc: "거듭제곱과 거듭제곱근의 뜻을 알고, 그 성질을 이해한다.", 
                    levels: { high: "거듭제곱근의 성질을 이용해 복잡한 식을 계산함", mid: "거듭제곱근의 뜻을 이해하고 성질을 적용함", low: "기초적인 거듭제곱근 값을 구함" },
                    questions: [
                        { q: "$\\sqrt[3]{27}$의 값은?", level: "C", reason: "세제곱하여 27이 되는 실수를 찾는 문제로, 거듭제곱근의 정의를 이해하고 있는지 확인하는 기본적인 문제입니다. '중' 수준에 해당합니다." }
                    ] 
                }
            ]
        }
    };

    let currentSubject = "common2";
    let currentStandardCode = null;
    let currentLevelQ = 0;

    function showSection(id) {
        document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
        if (id === 'quiz') {
            initLevelQuiz();
        }
    }

    function changeSubject() {
        currentSubject = document.getElementById('math-subjects').value;
        const data = subjectData[currentSubject];
        
        if(!data) {
            alert("자료 준비 중입니다.");
            return;
        }

        document.getElementById('main-title').innerText = "2022 개정 수학: 성취기준 매칭 시스템";
        document.getElementById('sub-title').innerText = data.title + ": " + data.subtitle;
        
        initDashboard();
        initLevelQuiz();
        initChecklist();
    }

    function initDashboard() {
        const container = document.getElementById('card-container');
        container.innerHTML = "";
        subjectData[currentSubject].standards.forEach(std => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<h3>${std.code}</h3><p>${std.desc}</p>`;
            card.onclick = () => openModal(std);
            container.appendChild(card);
        });
    }

    function initLevelQuiz() {
        const container = document.getElementById('quiz-standard-list');
        container.innerHTML = '';
        
        const standardsWithQuestions = subjectData[currentSubject].standards.filter(std => std.questions && std.questions.length > 0);

        if (standardsWithQuestions.length === 0) {
            container.innerHTML = "<p style='text-align:center;'>이 과목에는 아직 문항 매칭 연습 문제가 없습니다.</p>";
        } else {
            standardsWithQuestions.forEach(std => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.style.marginBottom = '1rem';
                btn.innerHTML = `<strong>${std.code}</strong><br>${std.desc}`;
                btn.onclick = () => startLevelMatching(std.code);
                container.appendChild(btn);
            });
        }

        backToStandardSelection();
    }

    function startLevelMatching(code) {
        currentStandardCode = code;
        currentLevelQ = 0;
        document.getElementById('quiz-standard-selection').style.display = 'none';
        document.getElementById('quiz-level-matching').style.display = 'block';
        
        const standard = subjectData[currentSubject].standards.find(s => s.code === code);
        document.getElementById('selected-standard-info').innerText = `${standard.code} ${standard.desc}`;
        
        const levelsContainer = document.getElementById('achievement-levels');
        levelsContainer.innerHTML = `
            <h4>성취수준</h4>
            <div class="level-desc-grid">
                <div class="level-desc-item"><strong>상 (A)</strong> ${standard.levels.high}</div>
                <div class="level-desc-item"><strong>중 (C)</strong> ${standard.levels.mid}</div>
                <div class="level-desc-item"><strong>하 (E)</strong> ${standard.levels.low}</div>
            </div>
        `;

        loadLevelQuestion();
    }

    function loadLevelQuestion() {
        const standard = subjectData[currentSubject].standards.find(s => s.code === currentStandardCode);
        const qBox = document.getElementById('level-question-text');
        const optionsBox = document.getElementById('level-options');
        const feedbackBox = document.getElementById('level-feedback');

        const question = standard.questions[currentLevelQ];
        qBox.innerHTML = `<strong>[문항 ${currentLevelQ + 1}/${standard.questions.length}]</strong><br><br>${question.q}`;
        optionsBox.innerHTML = '';
        feedbackBox.innerHTML = '';
        feedbackBox.style.display = 'none';

        const levels = ['A', 'B', 'C', 'D', 'E'];
        const levelDesc = {'A': '상', 'B': '상', 'C': '중', 'D': '하', 'E': '하'};
        levels.forEach(level => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = `Level ${level} (${levelDesc[level]})`;
            btn.onclick = () => checkLevelAnswer(level, btn);
            optionsBox.appendChild(btn);
        });

        if (window.MathJax) MathJax.typesetPromise([qBox]);
    }

    function checkLevelAnswer(selectedLevel, btn) {
        const standard = subjectData[currentSubject].standards.find(s => s.code === currentStandardCode);
        const question = standard.questions[currentLevelQ];
        const correctLevel = question.level;
        const fb = document.getElementById('level-feedback');

        document.querySelectorAll('#level-options .option-btn').forEach(b => {
            b.disabled = true;
            b.style.backgroundColor = '';
            b.style.border = '1px solid var(--border)';
        });
        
        fb.style.display = 'block';

        if (selectedLevel === correctLevel) {
            fb.innerHTML = `🎉 <strong>정답입니다!</strong>`;
            fb.style.color = "#166534";
            fb.style.backgroundColor = '#dcfce7';
            btn.style.border = '2px solid #166534';
        } else {
            fb.innerHTML = `❌ <strong>오답입니다.</strong> 이 문항은 <strong>'${correctLevel}'(${ {'A':'상','B':'상','C':'중','D':'하','E':'하'}[correctLevel] })</strong> 수준입니다.<br><br><strong>[이유]</strong> ${question.reason}`;
            fb.style.color = "#991b1b";
            fb.style.backgroundColor = '#fee2e2';
            btn.style.border = '2px solid #991b1b';

            // 정답 버튼 하이라이트
            document.querySelectorAll('#level-options .option-btn').forEach(b => {
                if (b.innerText.startsWith(`Level ${correctLevel}`)) {
                    b.style.backgroundColor = '#dcfce7';
                     b.style.border = '2px solid #166534';
                }
            });
        }
    }

    function nextLevelQuestion() {
        const standard = subjectData[currentSubject].standards.find(s => s.code === currentStandardCode);
        if (!standard || standard.questions.length === 0) return;
        currentLevelQ = (currentLevelQ + 1) % standard.questions.length;
        loadLevelQuestion();
    }
    
    function backToStandardSelection() {
        currentStandardCode = null;
        document.getElementById('quiz-standard-selection').style.display = 'block';
        document.getElementById('quiz-level-matching').style.display = 'none';
    }

    function initChecklist() {
        const container = document.getElementById('checklist-container');
        container.innerHTML = "";
        const saved = JSON.parse(localStorage.getItem('check_' + currentSubject)) || {};
        subjectData[currentSubject].standards.forEach(std => {
            const div = document.createElement('div');
            div.className = 'check-item';
            div.innerHTML = `<input type="checkbox" id="c-${std.code}" ${saved[std.code]?'checked':''}>
                             <label for="c-${std.code}"><strong>${std.code}</strong> ${std.desc}</label>`;
            container.appendChild(div);
        });
    }

    function saveChecklist() {
        const checks = {};
        document.querySelectorAll('#checklist-container input').forEach(input => {
            checks[input.id.replace('c-', '')] = input.checked;
        });
        localStorage.setItem('check_' + currentSubject, JSON.stringify(checks));
        alert("저장되었습니다.");
    }

    function openModal(std) {
        document.getElementById('modal-title').innerText = std.code;
        document.getElementById('modal-desc').innerText = std.desc;
        document.getElementById('level-high').innerText = std.levels.high;
        document.getElementById('level-mid').innerText = std.levels.mid;
        document.getElementById('level-low').innerText = std.levels.low;
        document.getElementById('level-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('level-modal').style.display = 'none'; }

    window.onload = () => { initDashboard(); initLevelQuiz(); initChecklist(); };
</script>
</body>
